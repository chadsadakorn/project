<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>เพิ่มผู้ใช้ใหม่ - ระบบจัดการครุภัณฑ์</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="css/style.css" rel="stylesheet" />
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
    <div class="container-fluid">
      <a class="navbar-brand" href="dashboard.html">
        <i class="bi bi-boxes me-2"></i>ระบบจัดการครุภัณฑ์
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link" href="dashboard.html"><i class="bi bi-speedometer2 me-1"></i>Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" href="assets.html"><i class="bi bi-archive me-1"></i>ครุภัณฑ์</a></li>
          <li class="nav-item"><a class="nav-link" href="users.html"><i class="bi bi-people me-1"></i>จัดการผู้ใช้</a></li>
        </ul>
        <div class="navbar-nav">
          <span class="nav-item navbar-text text-white me-3" id="navUsername"></span>
          <a class="nav-link" href="#" id="logoutBtn"><i class="bi bi-box-arrow-right me-1"></i>ออกจากระบบ</a>
        </div>
      </div>
    </div>
  </nav>

  <div class="container mt-4">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card shadow-sm">
          <div class="card-header bg-primary text-white">
            <h5 class="mb-0"><i class="bi bi-person-plus me-2"></i>เพิ่มผู้ใช้ใหม่</h5>
          </div>
          <div class="card-body p-4">
            <div id="message"></div>
            <form id="registerForm">
              <div class="mb-3">
                <label for="username" class="form-label fw-medium">ชื่อผู้ใช้ <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="username" placeholder="กรอกชื่อผู้ใช้" required />
              </div>
              <div class="mb-3">
                <label for="firstname" class="form-label fw-medium">ชื่อ <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="firstname" placeholder="กรอกชื่อ" required />
              </div>
              <div class="mb-3">
                <label for="lastname" class="form-label fw-medium">นามสกุล <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="lastname" placeholder="กรอกนามสกุล" required />
              </div>
              <div class="mb-3">
                <label for="role" class="form-label fw-medium">บทบาท <span class="text-danger">*</span></label>
                <select class="form-select" id="role">
                  <option value="user">ผู้ใช้ทั่วไป (user)</option>
                  <option value="admin">ผู้ดูแลระบบ (admin)</option>
                </select>
              </div>
              <div class="mb-3">
                <label for="password" class="form-label fw-medium">รหัสผ่าน <span class="text-danger">*</span></label>
                <input type="password" class="form-control" id="password" placeholder="อย่างน้อย 6 ตัวอักษร" required />
              </div>
              <div class="mb-4">
                <label for="confirmPassword" class="form-label fw-medium">ยืนยันรหัสผ่าน <span class="text-danger">*</span></label>
                <input type="password" class="form-control" id="confirmPassword" placeholder="กรอกรหัสผ่านอีกครั้ง" required />
              </div>
              <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary flex-fill">
                  <i class="bi bi-person-check me-2"></i>เพิ่มผู้ใช้
                </button>
                <a href="users.html" class="btn btn-outline-secondary flex-fill">
                  <i class="bi bi-arrow-left me-2"></i>กลับ
                </a>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
