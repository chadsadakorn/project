<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>สมัครสมาชิก - ระบบจัดการครุภัณฑ์</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="css/style.css" rel="stylesheet" />
</head>
<body class="auth-body">
  <div class="auth-wrapper">
    <div class="auth-card card shadow-lg">
      <div class="auth-header text-center">
        <i class="bi bi-boxes fs-1 text-white"></i>
        <h4 class="text-white mt-2 mb-0">ระบบจัดการครุภัณฑ์</h4>
        <p class="text-white-50 small">สมัครสมาชิกเพื่อใช้งานระบบ</p>
      </div>
      <div class="card-body p-4">
        <div id="message"></div>
        <form id="signupForm">
          <div class="mb-3">
            <label class="form-label fw-medium">ชื่อผู้ใช้</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-person"></i></span>
              <input type="text" class="form-control" id="username" placeholder="กรอกชื่อผู้ใช้" required />
            </div>
          </div>
          <div class="row g-2 mb-3">
            <div class="col">
              <label class="form-label fw-medium">ชื่อ</label>
              <input type="text" class="form-control" id="firstname" placeholder="ชื่อ" required />
            </div>
            <div class="col">
              <label class="form-label fw-medium">นามสกุล</label>
              <input type="text" class="form-control" id="lastname" placeholder="นามสกุล" required />
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-medium">รหัสผ่าน</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" class="form-control" id="password" placeholder="อย่างน้อย 6 ตัวอักษร" required />
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label fw-medium">ยืนยันรหัสผ่าน</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
              <input type="password" class="form-control" id="confirmPassword" placeholder="กรอกรหัสผ่านอีกครั้ง" required />
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-100 btn-login" id="submitBtn">
            <i class="bi bi-person-check me-2"></i>สมัครสมาชิก
          </button>
        </form>
        <hr class="my-3" />
        <p class="text-center text-muted small mb-0">
          มีบัญชีแล้ว? <a href="login.html" class="text-primary fw-medium">เข้าสู่ระบบ</a>
        </p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/signup.js"></script>
</body>
</html>
