<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>จัดการผู้ใช้ - ระบบจัดการครุภัณฑ์</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="css/style.css" rel="stylesheet" />
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
    <div class="container-fluid">
      <a class="navbar-brand" href="dashboard.html"><i class="bi bi-boxes me-2"></i>ระบบจัดการครุภัณฑ์</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link" href="dashboard.html"><i class="bi bi-speedometer2 me-1"></i>Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" href="assets.html"><i class="bi bi-archive me-1"></i>ครุภัณฑ์</a></li>
          <li class="nav-item"><a class="nav-link" href="borrowing.html"><i class="bi bi-arrow-left-right me-1"></i>การยืม-คืน</a></li>
          <li class="nav-item"><a class="nav-link" href="report.html"><i class="bi bi-file-earmark-bar-graph me-1"></i>รายงาน</a></li>
          <li class="nav-item admin-only d-none"><a class="nav-link active" href="users.html"><i class="bi bi-people me-1"></i>จัดการผู้ใช้</a></li>
        </ul>
        <div class="navbar-nav">
          <span class="nav-item navbar-text text-white me-3" id="navUsername"></span>
          <a class="nav-link" href="#" id="logoutBtn"><i class="bi bi-box-arrow-right me-1"></i>ออกจากระบบ</a>
        </div>
      </div>
    </div>
  </nav>

  <div class="container-fluid mt-4 px-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h4 class="mb-0 fw-bold"><i class="bi bi-people me-2 text-primary"></i>จัดการผู้ใช้</h4>
      <a href="register.html" class="btn btn-primary">
        <i class="bi bi-person-plus me-2"></i>เพิ่มผู้ใช้ใหม่
      </a>
    </div>

    <div id="message"></div>

    <div class="card shadow-sm border-0">
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
              <tr>
                <th>#</th>
                <th>ชื่อผู้ใช้</th>
                <th>ชื่อ-นามสกุล</th>
                <th>บทบาท</th>
                <th>วันที่สร้าง</th>
                <th>จัดการ</th>
              </tr>
            </thead>
            <tbody id="usersBody">
              <tr><td colspan="6" class="text-center py-4"><div class="spinner-border spinner-border-sm me-2"></div>กำลังโหลด...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Delete Confirm Modal -->
  <div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog modal-sm">
      <div class="modal-content">
        <div class="modal-header bg-danger text-white">
          <h5 class="modal-title"><i class="bi bi-trash me-2"></i>ยืนยันการลบ</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <p>คุณต้องการลบผู้ใช้ <strong id="deleteUsername"></strong> ใช่หรือไม่?</p>
          <p class="text-muted small">การกระทำนี้ไม่สามารถย้อนกลับได้</p>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">ยกเลิก</button>
          <button type="button" class="btn btn-danger" id="confirmDeleteBtn">
            <i class="bi bi-trash me-2"></i>ลบ
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/users.js"></script>
</body>
</html>
