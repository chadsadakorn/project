<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>เข้าสู่ระบบ - ระบบจัดการครุภัณฑ์</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="css/style.css" rel="stylesheet" />
</head>
<body class="auth-body">
  <div class="auth-wrapper">
    <div class="auth-card card shadow-lg">
      <div class="auth-header text-center">
        <i class="bi bi-boxes fs-1 text-white"></i>
        <h4 class="text-white mt-2 mb-0">ระบบจัดการครุภัณฑ์</h4>
        <p class="text-white-50 small">กรุณาเข้าสู่ระบบเพื่อดำเนินการต่อ</p>
      </div>
      <div class="card-body p-4">
        <div id="message"></div>
        <form id="loginForm">
          <div class="mb-3">
            <label for="username" class="form-label fw-medium">ชื่อผู้ใช้</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-person"></i></span>
              <input type="text" class="form-control" id="username" placeholder="กรอกชื่อผู้ใช้" required />
            </div>
          </div>
          <div class="mb-4">
            <label for="password" class="form-label fw-medium">รหัสผ่าน</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" class="form-control" id="password" placeholder="กรอกรหัสผ่าน" required />
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-100 btn-login" id="submitBtn">
            <i class="bi bi-box-arrow-in-right me-2"></i>เข้าสู่ระบบ
          </button>
        </form>
        <hr class="my-3" />
        <p class="text-center text-muted small mb-0">
          ยังไม่มีบัญชี? <a href="signup.html" class="text-primary fw-medium">สมัครสมาชิก</a>
        </p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
